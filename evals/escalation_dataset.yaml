  message: "This is absolutely unacceptable."
  gold_escalate: true

- id: esc-009
  category: strong-frustration
  message: "This is the worst service I have ever experienced."
  gold_escalate: true

- id: esc-010
  category: strong-frustration
  message: "I am absolutely furious about this."
  gold_escalate: true

- id: esc-011
  category: strong-frustration
  message: "This is useless."
  gold_escalate: true

- id: esc-012
  category: strong-frustration
  message: "I've had enough of this terrible support."
  gold_escalate: true

- id: esc-013
  category: strong-frustration
  message: "This is ridiculous, I've been waiting for weeks."
  gold_escalate: true

# =============================================================================
# HIGH EMOTION (8) — angry/disgusted with NO handoff or strong-phrase keyword.
# Rules-only MISSES these. The emotion model catches them only when anger >= 0.75
# or disgust >= 0.70 (several land mid-strength and slip through); hybrid / qwen
# recover the rest via the Qwen classifier.
# =============================================================================

- id: esc-014
  category: high-emotion
  message: "Are you kidding me right now?!"
  gold_escalate: true

- id: esc-015
  category: high-emotion
  message: "I cannot believe how badly this was handled."
  gold_escalate: true

- id: esc-016
  category: high-emotion
  message: "Why on earth would you charge me twice?!"
  gold_escalate: true

- id: esc-017
  category: high-emotion
  message: "This whole situation makes me so angry I could scream."
  gold_escalate: true

- id: esc-018
  category: high-emotion
  message: "I am so mad about what happened to my order."
  gold_escalate: true

- id: esc-019
  category: high-emotion
  message: "Honestly, I'm disgusted by how I've been treated."
  gold_escalate: true

- id: esc-020
  category: high-emotion
  message: "How dare you cancel my order without telling me?!"
  gold_escalate: true

- id: esc-021
  category: high-emotion
  message: "You've completely ruined my day with this mess."
  gold_escalate: true

# =============================================================================
# TREND FRUSTRATION (6) — moderate wording + previous_streak: 1 so this turn
# crosses streak >= 2. Most carry a repeated-problem keyword so even rules mode
# escalates on the streak; the trend detector handles emotion/hybrid.
# =============================================================================

- id: esc-022
  category: trend-frustration
  message: "This is happening again."
  previous_streak: 1
  gold_escalate: true

- id: esc-023
  category: trend-frustration
  message: "I'm contacting you about this issue again."
  previous_streak: 1
  gold_escalate: true

- id: esc-024
  category: trend-frustration
  message: "This is the third time I'm reaching out."
  previous_streak: 1
  gold_escalate: true

- id: esc-025
  category: trend-frustration
  message: "I've already contacted you about this twice."
  previous_streak: 1
  gold_escalate: true

- id: esc-026
  category: trend-frustration
  message: "You keep failing to deliver my order."
  previous_streak: 1
  gold_escalate: true

- id: esc-027
  category: trend-frustration
  message: "I've repeatedly asked for an update and heard nothing."
  previous_streak: 1
  gold_escalate: true

# =============================================================================
# CONTEXTUAL FRUSTRATION (5) — the latest message is mild on its own, but the
# conversation context shows repeated, unresolved failure. previous_streak: 1
# lets hybrid call Qwen. Qwen (context-aware) is the best detector here; rules and
# emotion miss entirely, and even Qwen may miss the very mildest one-liners.
# =============================================================================

- id: esc-028
  category: contextual-frustration
  message: "Nothing has changed."
  context:
    - "I reported my missing parcel three days ago."
    - "Your team promised a callback that never came."
  previous_streak: 1
  gold_escalate: true

- id: esc-029
  category: contextual-frustration
  message: "I'm still waiting."
  context:
    - "My refund was supposed to arrive last week."
    - "I was told it had already been processed two days ago."
  previous_streak: 1
  gold_escalate: true

- id: esc-030
  category: contextual-frustration
  message: "So what happens now?"
  context:
    - "This is the fourth delivery attempt that has failed."
    - "Every time I'm told it will be resolved and it isn't."
  previous_streak: 1
  gold_escalate: true

- id: esc-031
  category: contextual-frustration
  message: "Is anyone actually going to help me?"
  context:
    - "I've explained my issue to three different bots."
    - "None of them solved anything."
  previous_streak: 1
  gold_escalate: true

- id: esc-032
  category: contextual-frustration
  message: "I don't know what else to do at this point."
  context:
    - "My account has been locked for a week."
    - "I keep getting the same automated reply."
  previous_streak: 1
  gold_escalate: true


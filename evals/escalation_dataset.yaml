# NovaCart escalation (human-handoff) eval dataset
# 32 should-escalate + 19 should-not-escalate = 51 cases
#
# Schema: id, category, message, gold_escalate,
#         context (optional list[str] of prior user messages, for Qwen),
#         previous_streak (optional int, simulates prior frustrated-turn state)
#
# Positive class = the bot SHOULD offer a human handoff.
# Cases are crafted so the four modes diverge: rules+strong phrases are caught by
# the regex pre-step in EVERY mode, while high-emotion and context-dependent cases
# can only be caught by the emotion model / Qwen.

# =============================================================================
# EXPLICIT REQUEST (7) — matches _EXPLICIT_HANDOFF_PATTERNS; every mode catches.
# =============================================================================

- id: esc-001
  category: explicit-request
  message: "Please connect me to a human agent."
  gold_escalate: true

- id: esc-002
  category: explicit-request
  message: "I want to speak to a manager."
  gold_escalate: true

- id: esc-003
  category: explicit-request
  message: "Can you transfer me to a real person?"
  gold_escalate: true

- id: esc-004
  category: explicit-request
  message: "I need a human, this bot isn't helping."
  gold_escalate: true

- id: esc-005
  category: explicit-request
  message: "Get me a supervisor now."
  gold_escalate: true

- id: esc-006
  category: explicit-request
  message: "I'd like to file a complaint about my order."
  gold_escalate: true

- id: esc-007
  category: explicit-request
  message: "Please escalate me to a representative."
  gold_escalate: true

# =============================================================================
# STRONG FRUSTRATION (6) — matches _STRONG_FRUSTRATION_PATTERNS; rules pre-step.
